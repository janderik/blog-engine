<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Posts tagged #{{ tag }} - {{ site.title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 2rem; }
        header { margin-bottom: 2rem; }
        header h1 { font-size: 1.5rem; }
        article { margin-bottom: 1.5rem; }
        article h2 a { text-decoration: none; color: #0066cc; }
        .post-meta { color: #888; font-size: 0.9rem; }
        nav a { text-decoration: none; color: #0066cc; }
        footer { margin-top: 3rem; padding-top: 1rem; border-top: 2px solid #eee; color: #888; }
    </style>
</head>
<body>
    <header>
        <nav><a href="../">&larr; Home</a></nav>
        <h1>Posts tagged #{{ tag }}</h1>
    </header>
    <main>
        {% for post in posts %}
        <article>
            <h2><a href="../posts/{{ post.slug }}">{{ post.title }}</a></h2>
            <div class="post-meta">{{ post.date }}</div>
            <p>{{ post.excerpt }}</p>
        </article>
        {% endfor %}
    </main>
    <footer>
        <p>Built with blog-engine</p>
    </footer>
</body>
</html>
