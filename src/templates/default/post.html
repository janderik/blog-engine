<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ post.title }} - {{ site.title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.8; color: #333; max-width: 800px; margin: 0 auto; padding: 2rem; }
        header { margin-bottom: 2rem; }
        header h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .post-meta { color: #888; }
        article { margin-bottom: 2rem; }
        article h2 { margin-top: 2rem; margin-bottom: 0.5rem; }
        article h3 { margin-top: 1.5rem; margin-bottom: 0.5rem; }
        article p { margin-bottom: 1rem; }
        article ul, article ol { margin-bottom: 1rem; padding-left: 2rem; }
        article code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
        article pre { background: #f6f8fa; padding: 1rem; border-radius: 4px; overflow-x: auto; margin-bottom: 1rem; }
        article pre code { background: none; padding: 0; }
        blockquote { border-left: 4px solid #ddd; padding-left: 1rem; color: #666; margin-bottom: 1rem; }
        .tags { margin-top: 1rem; }
        .tags a { background: #f0f0f0; padding: 2px 8px; border-radius: 3px; text-decoration: none; color: #666; font-size: 0.85rem; margin-right: 4px; }
        footer { margin-top: 3rem; padding-top: 1rem; border-top: 2px solid #eee; color: #888; }
        nav a { text-decoration: none; color: #0066cc; }
        .highlight { background: #f6f8fa; padding: 1rem; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <header>
        <nav><a href="../">&larr; Back to {{ site.title }}</a></nav>
        <h1>{{ post.title }}</h1>
        <div class="post-meta">{{ post.date }}</div>
    </header>
    <article>
        {{ post.html | safe }}
    </article>
    {% if post.tags %}
    <div class="tags">
        {% for tag in post.tags %}
        <a href="../tags/{{ tag }}">#{{ tag }}</a>
        {% endfor %}
    </div>
    {% endif %}
    <footer>
        <p>Built with blog-engine</p>
    </footer>
</body>
</html>
