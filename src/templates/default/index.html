<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.base_url }}/rss.xml">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; max-width: 800px; margin: 0 auto; padding: 2rem; }
        header { margin-bottom: 2rem; border-bottom: 2px solid #eee; padding-bottom: 1rem; }
        header h1 a { text-decoration: none; color: #333; }
        nav a { margin-right: 1rem; text-decoration: none; color: #666; }
        article { margin-bottom: 2rem; }
        article h2 a { text-decoration: none; color: #0066cc; }
        .post-meta { color: #888; font-size: 0.9rem; }
        .tags a { background: #f0f0f0; padding: 2px 8px; border-radius: 3px; text-decoration: none; color: #666; font-size: 0.85rem; margin-right: 4px; }
        footer { margin-top: 3rem; padding-top: 1rem; border-top: 2px solid #eee; color: #888; font-size: 0.9rem; }
        .highlight { background: #f6f8fa; padding: 1rem; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <header>
        <h1><a href="{{ site.base_url }}">{{ site.title }}</a></h1>
        <p>{{ site.description }}</p>
        <nav>
            <a href="{{ site.base_url }}">Home</a>
        </nav>
    </header>
    <main>
        {% for post in posts %}
        <article>
            <h2><a href="posts/{{ post.slug }}">{{ post.title }}</a></h2>
            <div class="post-meta">{{ post.date }}</div>
            <p>{{ post.excerpt }}</p>
            {% if post.tags %}
            <div class="tags">
                {% for tag in post.tags %}
                <a href="tags/{{ tag }}">#{{ tag }}</a>
                {% endfor %}
            </div>
            {% endif %}
        </article>
        {% endfor %}
        {% if not posts %}
        <p>No posts yet.</p>
        {% endif %}
    </main>
    <footer>
        <p>Built with blog-engine</p>
    </footer>
</body>
</html>
